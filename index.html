<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY WEBSITE</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #090909;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 500px;
      margin: auto;
      min-height: 100vh;
      background: #111;
    }

    .header {
      text-align: center;
      padding: 20px;
      background: linear-gradient(135deg, #111, #292929);
    }

    .logo {
      font-size: 30px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .banner {
      margin: 15px;
      padding: 45px 20px;
      border-radius: 15px;
      text-align: center;
      background: linear-gradient(135deg, #5522cc, #b224ef);
    }

    .banner h1 {
      font-size: 27px;
      margin-bottom: 10px;
    }

    .banner p {
      color: #eee;
    }

    .buttons {
      padding: 0 15px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin-bottom: 10px;
      text-align: center;
      text-decoration: none;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      background: linear-gradient(90deg, #6c35ff, #b224ef);
    }

    .info {
      margin: 15px;
      padding: 20px;
      background: #1b1b1b;
      border-radius: 12px;
    }

    .info h2 {
      margin-bottom: 10px;
    }

    .footer {
      text-align: center;
      color: #777;
      padding: 25px;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <div class="logo">MY WEBSITE</div>
    </div>

    <div class="banner">
      <h1>WELCOME</h1>
      <p>Selamat datang di website resmi kami</p>
    </div>

    <div class="buttons">
      <a href="#" class="btn">MASUK WEBSITE</a>
      <a href="#" class="btn">INFORMASI</a>
    </div>

    <div class="info">
      <h2>Website Resmi</h2>
      <p>
        Temukan informasi terbaru dan akses layanan kami melalui halaman resmi ini.
      </p>
    </div>

    <div class="footer">
      © 2026 MY WEBSITE
    </div>

  </div>

</body>
</html>
